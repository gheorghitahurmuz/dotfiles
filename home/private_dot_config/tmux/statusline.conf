# vim: ft=tmux

set -g status-position top
set -g status-interval 5
set -g status-style 'bg=default fg=default'

set -g status-left-length 40
set -g status-right-length 20

set -g status-left '#[fg=green,bold] #S #[fg=default,nobold]│ '
set -g status-right ' </>'

setw -g window-status-format         '  (#I) #{b:pane_current_path} '
setw -g window-status-current-format ' #[bold](#I) #{b:pane_current_path} '

set -g pane-border-style        'fg=#303030'
set -g pane-active-border-style 'fg=green'
set -g pane-border-format       ' #{pane_title} '
set -g pane-border-indicators off

set -g message-style 'bg=green fg=black bold'
