# vim: ft=tmux

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind e source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Splits ────────────────────────────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Panes ─────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r command-prompt -p "Pane title:" "select-pane -T '%%'"
bind x kill-pane

# ── Windows ───────────────────────────────
bind n next-window
bind P previous-window
bind R command-prompt -p "Window name:" "rename-window '%%'"
bind X kill-window

# ── Sessions ──────────────────────────────
bind s choose-session
bind S command-prompt -p "Session name:" "rename-session '%%'"
bind d detach-client

# ── Cleanup replaced defaults ─────────────
unbind ,
unbind &
unbind l
unbind $

# ── Copy mode ─────────────────────────────
setw -g mode-keys vi

bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind p paste-buffer

bind-key -n S-Enter send-keys Escape "[13;2u"
